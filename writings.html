<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ming | Writings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #f7f7f7;
    scroll-behavior: smooth;
  }

  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 300px;
    height: 100vh;
    background-color: #ffffff;
    padding: 30px;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    overflow-y: auto;
  }

  .profile-image {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
    border: 3px solid #ffffff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  .sidebar h2 { margin: 10px 0; font-size: 24px; color: #333; }

  .sidebar .social-links a {
    color: #0057b7; font-size: 28px; margin: 0 2px;
    text-decoration: none; transition: color 0.3s ease;
  }
  .sidebar .social-links a:hover { color: #003366; }
  .sidebar .social-links .github-link { color: #000000; }
  .sidebar .social-links .github-link:hover { color: #555555; }

  .sidebar nav { margin-top: 30px; display: flex; flex-direction: column; }
  .sidebar nav a {
    color: #333; text-decoration: none; font-weight: bold;
    font-size: 18px; padding: 10px 0; transition: color 0.3s ease;
  }
  .sidebar nav a:hover { color: #0057b7; }

  .cv-btn {
    display: inline-block; margin-top: 20px; padding: 8px 18px;
    background-color: #0057b7; color: #ffffff; text-decoration: none;
    border-radius: 6px; font-size: 15px; font-weight: bold;
    transition: background-color 0.3s ease;
  }
  .cv-btn:hover { background-color: #003f8a; }

  .main-content {
    margin-left: 300px;
    padding: 40px 60px;
    max-width: 1060px;
  }

  .main-content h1 {
    color: #0057b7;
    font-size: 36px;
    margin-bottom: 30px;
  }

  .writings-list { max-width: 720px; }

  .writing-entry {
    margin-bottom: 40px;
    padding-bottom: 40px;
    border-bottom: 1px solid #e0e0e0;
  }
  .writing-entry:last-child { border-bottom: none; }

  .writing-entry a {
    text-decoration: none;
    color: inherit;
  }
  .writing-entry a:hover .writing-title {
    color: #0057b7;
  }

  .writing-title {
    font-size: 24px;
    color: #1a1a1a;
    margin: 0 0 6px 0;
    transition: color 0.2s ease;
  }

  .writing-date {
    font-size: 13px;
    color: #aaa;
    margin: 0 0 12px 0;
  }

  .writing-excerpt {
    font-size: 16px;
    line-height: 1.7;
    color: #555;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #ddd;
    font-size: 14px;
    color: #888;
  }

  @media (max-width: 768px) {
    .sidebar {
      position: static; width: 100%; height: auto;
      border-right: none; border-bottom: 1px solid #ddd;
    }
    .main-content { margin-left: 0; padding: 20px; }
  }
  </style>
</head>

    <nav>

      <a href="./index.html#education">Educations</a>
      <a href="./index.html#experiences">Experiences</a>
      <a href="./writings.html">Writings</a>
    </nav>
    <a href="./CV.pdf" target="_blank" class="cv-btn">

  <main class="main-content">

    <div class="footer">&copy; 2025 Minguhn Kim</div>
